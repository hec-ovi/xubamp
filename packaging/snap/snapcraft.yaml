# Snap recipe: repacks the released deb instead of compiling inside snapcraft,
# so the snap ships the exact binary the deb pipeline built and tested.
#
# Build (unpacks the matching deb from packaging/dist, then packs):
#   ./packaging/snap/build-snap.sh
#
# Local test install and store upload:
#   sudo snap install ./packaging/snap/xubamp_*.snap --dangerous
#   snapcraft upload --release=stable packaging/snap/xubamp_*.snap
#
# base core26 is built from Ubuntu 26.04 LTS, the same platform xubamp is
# tuned for. Strict confinement; wayland and audio-playback (auto-connect)
# cover display and PipeWire, home covers reading music and skins.
name: xubamp
base: core26
version: '0.2.7'
summary: Classic Winamp 2.9x-style player, native Wayland, in Rust
description: |
  A from-scratch reimplementation of the classic Winamp 2.9x player for
  Ubuntu 26.04. Renders classic .wsz skins pixel for pixel, plays MP3, WAV,
  FLAC, and Ogg Vorbis through PipeWire, and ships the 10-band equalizer,
  playlist editor, and the XMMS-style spectrum analyzer and oscilloscope.
  No Wine, no XWayland, no widget toolkit.
grade: stable
confinement: strict
platforms:
  amd64:

apps:
  xubamp:
    command: usr/bin/xubamp
    plugs:
      - wayland
      - audio-playback
      - home
      - removable-media
    environment:
      XDG_DATA_DIRS: $SNAP/usr/share:$XDG_DATA_DIRS

parts:
  xubamp:
    # deb-root is produced by build-snap.sh (dpkg-deb -x of the released deb).
    plugin: dump
    source: deb-root
    stage-packages:
      - libpipewire-0.3-0t64
      - libxkbcommon0
    organize:
      usr/share/applications/xubamp.desktop: meta/gui/xubamp.desktop
      usr/share/icons/hicolor/256x256/apps/xubamp.png: meta/gui/xubamp.png
